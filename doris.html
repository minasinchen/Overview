<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Die Dreckige Doris · Unicornia Productions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garant:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --black:   #09080a;
      --card-bg: #130f0a;
      --doris:   #c8882c;
      --doris2:  #e0aa58;
      --doris3:  #f0cc88;
      --cream:   #ede0d0;
      --text:    #bbb0a8;
      --dim:     #5a5048;
      --border:  rgba(255,255,255,0.06);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      background-color: var(--black);
      background-image:
        radial-gradient(ellipse 100% 55% at 50% 0%, #1c1008 0%, #09080a 55%);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-weight: 300;
      min-height: 100vh;
    }

    /* ── NAV ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 2.5rem;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0;
      background: rgba(9,8,10,0.88);
      backdrop-filter: blur(12px);
      z-index: 100;
    }

    .nav-back {
      font-size: 0.78rem;
      letter-spacing: 0.15em;
      color: var(--dim);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: color 0.25s;
    }
    .nav-back:hover { color: var(--doris2); }

    .nav-title {
      font-family: 'Cormorant Garant', serif;
      font-size: 1rem;
      color: var(--dim);
      letter-spacing: 0.08em;
    }
    .nav-title em { font-style: italic; color: var(--doris); }

    /* ── HERO ── */
    .hero {
      padding: 5rem 2rem 4rem;
      text-align: center;
      position: relative;
    }

    .hero-eyebrow {
      font-size: 0.72rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--doris);
      opacity: 0.75;
      margin-bottom: 1.2rem;
      animation: fadeUp 0.8s ease 0.2s both;
    }

    .hero-title {
      font-family: 'Cormorant Garant', serif;
      font-size: clamp(3rem, 10vw, 7rem);
      font-weight: 300;
      color: var(--cream);
      letter-spacing: 0.02em;
      line-height: 0.95;
      animation: fadeUp 0.8s ease 0.4s both;
    }

    .hero-title em {
      font-style: italic;
      color: var(--doris);
    }

    .hero-ornament {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      justify-content: center;
      margin-top: 2rem;
      animation: fadeUp 0.8s ease 0.6s both;
    }

    .hero-ornament-line {
      width: 60px; height: 1px;
      background: linear-gradient(to right, transparent, rgba(200,136,44,0.45));
    }
    .hero-ornament-line:last-child {
      background: linear-gradient(to left, transparent, rgba(200,136,44,0.45));
    }

    /* ── CONTENT ── */
    .content {
      max-width: 960px;
      margin: 0 auto;
      padding: 4rem 2rem 2rem;
    }

    .section-label {
      font-size: 0.7rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--dim);
      text-align: center;
      margin-bottom: 3rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .section-label::before, .section-label::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    /* ── VIDEO GRID ── */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 2rem;
      margin-bottom: 5rem;
    }

    .video-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      transition: border-color 0.35s, box-shadow 0.4s;
    }
    .video-card::before {
      content: '';
      display: block;
      height: 2px;
      background: linear-gradient(to right, var(--doris), var(--doris2));
    }
    .video-card:hover {
      border-color: rgba(200,136,44,0.2);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(200,136,44,0.07);
    }

    .video-wrapper {
      position: relative; width: 100%; padding-top: 56.25%;
      background: #080504;
    }
    .video-wrapper iframe {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%; border: 0;
    }

    .video-info {
      padding: 1.2rem 1.5rem;
    }
    .video-tag {
      font-size: 0.67rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--doris);
      margin-bottom: 0.3rem;
    }
    .video-title {
      font-family: 'Cormorant Garant', serif;
      font-size: 1.3rem;
      color: var(--cream);
    }

    /* ── ALBUM SECTION ── */
    .album-section {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 2rem 8rem;
    }

    .album-card {
      background: var(--card-bg);
      border: 1px solid rgba(200,136,44,0.15);
      border-radius: 20px;
      overflow: hidden;
    }

    .album-header {
      padding: 2rem 2rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-end;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .album-art-placeholder {
      width: 90px; height: 90px;
      border-radius: 10px;
      background: linear-gradient(135deg, #1e1208, #2e1c0a);
      border: 1px solid rgba(200,136,44,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .album-info-text { flex: 1; }

    .album-label {
      font-size: 0.67rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--doris);
      margin-bottom: 0.4rem;
    }

    .album-title {
      font-family: 'Cormorant Garant', serif;
      font-size: 1.8rem;
      font-weight: 400;
      color: var(--cream);
      font-style: italic;
      line-height: 1;
    }

    .album-artist {
      font-size: 0.85rem;
      color: var(--dim);
      margin-top: 0.3rem;
    }

    /* Responsive playlist embed */
    .playlist-wrapper {
      position: relative; width: 100%; padding-top: 56.25%;
    }
    .playlist-wrapper iframe {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%; border: 0;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 2.5rem;
      color: var(--dim);
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      border-top: 1px solid var(--border);
    }

    @media (max-width: 600px) {
      nav { padding: 1.2rem 1.5rem; }
      .nav-title { display: none; }
      .video-grid { grid-template-columns: 1fr; }
      .album-header { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="productions.html" class="nav-back">← Unicornia Productions</a>
    <span class="nav-title">mina<em>sinchen</em></span>
    <span style="width:100px"></span>
  </nav>

  <header class="hero">
    <p class="hero-eyebrow">Unicornia Productions · Künstlerin</p>
    <h1 class="hero-title">Die <em>Dreckige</em> Doris</h1>
    <div class="hero-ornament">
      <div class="hero-ornament-line"></div>
      <!-- Small ornament -->
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
        <g transform="translate(9,9)">
          <ellipse cx="0" cy="-4.5" rx="2" ry="4.5" fill="#c8882c" opacity="0.7"/>
          <ellipse cx="0" cy="-4.5" rx="2" ry="4.5" fill="#c8882c" opacity="0.7" transform="rotate(90)"/>
          <ellipse cx="0" cy="-3.5" rx="1.5" ry="3.5" fill="#e0aa58" opacity="0.5" transform="rotate(45)"/>
          <ellipse cx="0" cy="-3.5" rx="1.5" ry="3.5" fill="#e0aa58" opacity="0.5" transform="rotate(135)"/>
          <circle r="2" fill="#f0cc88"/>
        </g>
      </svg>
      <div class="hero-ornament-line"></div>
    </div>
  </header>

  <main>
    <div class="content">
      <p class="section-label">Videos</p>
      <div class="video-grid">

        <div class="video-card">
          <div class="video-wrapper">
            <iframe src="https://www.youtube-nocookie.com/embed/Mc5E0DMSIlA"
              title="Die Dreckige Doris"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
              allowfullscreen></iframe>
          </div>
          <div class="video-info">
            <p class="video-tag">Musikvideo</p>
            <h2 class="video-title">Die Dreckige Doris</h2>
          </div>
        </div>

        <div class="video-card">
          <div class="video-wrapper">
            <iframe src="https://www.youtube-nocookie.com/embed/3mpmU8-6idA"
              title="Die Dreckige Doris"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
              allowfullscreen></iframe>
          </div>
          <div class="video-info">
            <p class="video-tag">Musikvideo</p>
            <h2 class="video-title">Die Dreckige Doris</h2>
          </div>
        </div>

      </div>
    </div>

    <!-- ── ALBUM ── -->
    <section class="album-section">
      <p class="section-label">Das Album</p>

      <div class="album-card">
        <div class="album-header">
          <div class="album-art-placeholder" aria-hidden="true">
            <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
              <circle cx="20" cy="20" r="16" stroke="#c8882c" stroke-width="1" opacity="0.4"/>
              <circle cx="20" cy="20" r="8"  stroke="#c8882c" stroke-width="1" opacity="0.3"/>
              <circle cx="20" cy="20" r="3"  fill="#c8882c" opacity="0.5"/>
              <line x1="4" y1="20" x2="36" y2="20" stroke="#c8882c" stroke-width="0.5" opacity="0.2"/>
              <line x1="20" y1="4" x2="20" y2="36" stroke="#c8882c" stroke-width="0.5" opacity="0.2"/>
            </svg>
          </div>
          <div class="album-info-text">
            <p class="album-label">Album · Playlist</p>
            <h2 class="album-title">Die Dreckige Doris</h2>
            <p class="album-artist">Die Dreckige Doris · Unicornia Productions</p>
          </div>
        </div>
        <div class="playlist-wrapper">
          <iframe
            src="https://www.youtube-nocookie.com/embed/videoseries?list=PL_ZhWUtoIIzRO88wX5sSO9R-SptfL30Bi"
            title="Die Dreckige Doris — Album Playlist"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            allowfullscreen></iframe>
        </div>
      </div>
    </section>

  </main>

  <footer>
    <p>handgemacht mit Sorgfalt &nbsp;·&nbsp; minasinchen</p>
  </footer>

</body>
</html>
